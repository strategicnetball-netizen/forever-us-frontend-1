<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Us - Dating App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: #999; margin-bottom: 30px; }
        .status { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 15px 0; }
        .status p { color: #666; margin: 5px 0; }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            margin: 10px 5px;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        .btn:hover { background: #764ba2; }
        .loading { color: #667eea; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Forever Us</h1>
        <p class="subtitle">Find Your Perfect Match</p>
        
        <div class="status">
            <p class="loading">✅ App is Live!</p>
            <p>Your dating app is now online and ready to use.</p>
        </div>

        <div class="status">
            <p><strong>Test Account:</strong></p>
            <p>Email: test@example.com</p>
            <p>Password: password123</p>
        </div>

        <button class="btn" onclick="alert('App is ready! Backend: https://forever-us-backend-f2f10897fc01.herokuapp.com')">
            Check Status
        </button>
    </div>
</body>
</html>
